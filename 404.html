<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>This site is currently offline</title>
<meta name="robots" content="noindex">
<style>
:root { color-scheme: dark; }
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, system-ui, sans-serif;
  background: radial-gradient(ellipse at top, #12121A 0%, #08080E 70%);
  color: #F5F5FA;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
}
.card { width: 100%; max-width: 480px; text-align: center; }
.status-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: #4FFFE0;
  box-shadow: 0 0 0 4px rgba(79,255,224,0.12), 0 0 20px rgba(79,255,224,0.4);
  margin: 0 auto 28px;
  animation: pulse 2.4s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 0.85; }
  50% { opacity: 0.4; }
}
h1 {
  font-size: clamp(26px, 4.5vw, 34px); font-weight: 600;
  letter-spacing: -0.02em; margin-bottom: 14px; color: #F5F5FA;
}
p.lead { color: #9797A0; font-size: 15px; margin-bottom: 48px; }
.invite {
  border-top: 1px solid rgba(255,255,255,0.08);
  padding-top: 34px;
}
.invite-title {
  font-size: 17px; font-weight: 500;
  color: #F5F5FA; margin-bottom: 18px;
  letter-spacing: -0.01em;
}
.invite-cta {
  display: inline-block;
  background: #4FFFE0; color: #08080E;
  font-weight: 600; font-size: 14px;
  padding: 12px 24px; border-radius: 8px;
  text-decoration: none;
  transition: transform 0.15s ease, filter 0.15s ease;
}
.invite-cta:hover { transform: translateY(-1px); filter: brightness(1.08); }
.invite-cta:focus-visible { outline: 2px solid #4FFFE0; outline-offset: 3px; }
.footer { margin-top: 36px; font-size: 12px; color: #6B6B74; letter-spacing: 0.02em; }
.footer a { color: #9797A0; text-decoration: none; }
.footer a:hover { color: #F5F5FA; }
</style>
</head>
<body>
  <main class="card">
    <div class="status-dot" aria-hidden="true"></div>
    <h1>This site is currently offline</h1>
    <p class="lead">The owner has temporarily taken it offline. Please check back later.</p>
    <section class="invite">
      <div class="invite-title">Want your own website online in 30 seconds?</div>
      <a class="invite-cta" href="https://htmlaunch.com/">Try HTMLaunch &rarr;</a>
    </section>
    <div class="footer"><a href="https://htmlaunch.com/">htmlaunch.com</a></div>
  </main>
</body>
</html>
