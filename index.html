function t(a,f){return lang==='ru'&&a[f==='n'?'r':'descr']||a[f]}
function go(p,id){page=p;document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));document.getElementById('page-'+p).classList.add('active');window.scrollTo(0,0);rNav();
if(p==='home')rHome();else if(p==='destinations')rDest();else if(p==='attraction')rAttr(id);else if(p==='tours')rTours();else if(p==='map')rMap();else if(p==='guide')rGuide();else if(p==='prices')rPrices();
document.getElementById('ft1').textContent=Lx('ft1');document.getElementById('ft2').textContent=Lx('ft2');}
function toggleLang(){lang=lang==='en'?'ru':'en';go(page)}
function rNav(){let h='';[['home','home'],['destinations','dest'],['tours','tours'],['map','map'],['guide','guide'],['prices','prices']].forEach(([p,k])=>{h+=`<button class="nb ${page===p?'a':''}" onclick="go('${p}')">${Lx(k)}</button>`});h+=`<button class="lb" onclick="toggleLang()">${lang==='en'?'RU 🇷🇺':'EN 🇬🇧'}</button>`;document.getElementById('nav').innerHTML=h}
function aC(a){return `<div class="card" onclick="go('attraction',${a.id})" style="border-top:4px solid ${a.clr}"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px"><span style="font-size:30px">${CATS[a.cat]||'📍'}</span><div style="display:flex;gap:4px"><span class="cb ${CCLS[a.cat]||'bn'}">${Lx(a.cat)}</span><span class="cb ${DCLS[a.diff]||'bm'}">${a.diff}</span></div></div><h3>${t(a,'n')}</h3><p>${t(a,'desc')}</p><div class="cm"><span>💵 ${a.fee}</span><span>📅 ${a.best}</span><span>👥 ${a.vis}/yr</span></div></div>`}
function tpR(tp){return `<div class="ar"><div><h5>${tp.name}</h5><span>${tp.prov} · ${tp.dur} · 👥 ${tp.grp||'—'} · ${tp.type}</span></div><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span class="ap">$${tp.price}</span>${tp.u?`<a href="${tp.u}" target="_blank" class="bkb" style="padding:7px 18px;font-size:12px">${Lx('book')}</a>`:'<span style="font-size:11px;color:var(--muted)">Ask locally</span>'}</div></div>`}
function acR(ac){return `<div class="ar"><div><h5>${ac.n}</h5><span>${ac.t} · ⭐ ${ac.r||'—'}${ac.p?' · '+ac.p:''}</span></div><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span class="ap">$${ac.lo}–${ac.hi}</span>${ac.u?`<a href="${ac.u}" target="_blank" class="bkb" style="padding:7px 18px;font-size:12px">${Lx('book')}</a>`:''}</div></div>`}
function rHome(){const s=[...A].sort((a,b)=>b.pop-a.pop);document.getElementById('page-home').innerHTML=`<div class="hero"><h1>${Lx('heroT')}</h1><p>${Lx('heroS')}</p><div class="hsi"><input placeholder="${Lx('search')}" oninput="sQ=this.value;if(this.value)go('destinations')"/></div><button class="hcta" onclick="go('destinations')">${Lx('explore')}</button></div><div class="cnt"><div class="sec"><div class="st">${Lx('feat')}</div><div class="g3">${s.slice(0,9).map(aC).join('')}</div></div><div class="sec"><div class="st">${Lx('bud')}</div><div class="bg"><div class="bc2"><div class="s" style="color:var(--green)">Backpacker</div><div class="rv">$15–35</div><div class="un">/day</div></div><div class="bc2"><div class="s" style="color:var(--blue)">Mid-range</div><div class="rv">$50–80</div><div class="un">/day</div></div><div class="bc2"><div class="s" style="color:var(--accent)">Comfortable</div><div class="rv">$80–150</div><div class="un">/day</div></div><div class="bc2"><div class="s" style="color:var(--gold)">Luxury</div><div class="rv">$150–300</div><div class="un">/day</div></div></div><p style="color:var(--muted);font-size:12px">${Lx('note')}</p></div><div class="sec"><div class="acy"><h3>${Lx('agT')}</h3><p>${Lx('agD')}</p><div class="af">${Lx('agF').map(f=>`<span>${f}</span>`).join('')}</div><button class="abtn">${Lx('agC')}</button></div></div></div>`}
function rDest(){const cats=['all','Canyon','Lake','National Park','Mountain','Unique'];let fb=`<input value="${sQ}" oninput="sQ=this.value;rDG()" placeholder="${Lx('search')}"/>`;cats.forEach(c=>{fb+=`<button class="fbtn ${fCat===c?'a':''}" onclick="fCat='${c}';rDest()">${Lx(c)}</button>`});document.getElementById('page-destinations').innerHTML=`<div class="cnt sec"><button class="bb" onclick="go('home')">${Lx('bk')}</button><div class="st">${Lx('allD')}</div><div class="fb">${fb}</div><div class="g3" id="dg"></div></div>`;rDG()}
function rDG(){const q=sQ.toLowerCase();const f=A.filter(a=>{const ms=!q||t(a,'n').toLowerCase().includes(q)||t(a,'desc').toLowerCase().includes(q)||a.reg.toLowerCase().includes(q)||a.city.toLowerCase().includes(q);const mc=fCat==='all'||a.cat===fCat;return ms&&mc}).sort((a,b)=>b.pop-a.pop);document.getElementById('dg').innerHTML=f.length?f.map(aC).join(''):'<p style="color:var(--muted);text-align:center;padding:40px;grid-column:1/-1">No results</p>'}
function rAttr(id){const a=A.find(x=>x.id===id);if(!a)return;const tours=TP[a.id]||[];const accs=ACC[a.id]||[];let h=`<div class="cnt sec"><button class="bb" onclick="go('destinations')">${Lx('bk')}</button><div class="dh" style="background:linear-gradient(135deg,${a.clr}18,${a.clr}08);border:1px solid ${a.clr}33"><div style="display:flex;gap:8px;align-items:center;margin-bottom:10px"><span style="font-size:38px">${CATS[a.cat]||'📍'}</span><span class="cb ${CCLS[a.cat]||'bn'}">${Lx(a.cat)}</span><span class="cb ${DCLS[a.diff]||'bm'}">${a.diff}</span></div><h1>${t(a,'n')}</h1><div class="loc">📍 ${a.city}, ${a.reg} · 👥 ~${a.vis} visitors/year</div><div class="desc">${t(a,'desc')}</div></div><div class="ig" style="margin-bottom:32px"><div class="ic"><div class="io">📅</div><h4>${Lx('bestT')}</h4><p>${a.best} (season: ${a.szn})</p></div><div class="ic"><div class="io">💵</div><h4>${Lx('fee')}</h4><p>${a.fee}</p></div><div class="ic"><div class="io">📍</div><h4>Region</h4><p>${a.reg}</p></div></div>`;
if(tours.length){h+=`<div class="st" style="font-size:22px;margin-bottom:12px">${Lx('avT')} (${tours.length})</div>`;tours.forEach(tp=>{h+=tpR(tp)});h+='<div style="height:24px"></div>'}
if(accs.length){h+=`<div class="st" style="font-size:22px;margin-bottom:12px">${Lx('acT')} (${accs.length})</div>`;accs.forEach(ac=>{h+=acR(ac)})}
h+='</div>';document.getElementById('page-attraction').innerHTML=h}
function rTours(){let h=`<div class="cnt sec"><button class="bb" onclick="go('home')">${Lx('bk')}</button><div class="st">${Lx('allT')}</div><div style="display:grid;gap:28px">`;Object.keys(TP).forEach(aid=>{const a=A.find(x=>x.id==aid);if(!a)return;h+=`<div><h3 style="font-family:var(--serif);font-size:20px;margin-bottom:10px;cursor:pointer" onclick="go('attraction',${a.id})">${CATS[a.cat]||'📍'} ${t(a,'n')}</h3>`;TP[aid].forEach(tp=>{h+=tpR(tp)});h+='</div>'});h+='</div></div>';document.getElementById('page-tours').innerHTML=h}
function rMap(){document.getElementById('page-map').innerHTML=`<div class="cnt sec"><button class="bb" onclick="go('home')">${Lx('bk')}</button><div class="st">${Lx('mapT')}</div><p style="color:var(--dim);font-size:14px;margin-bottom:16px">${Lx('mapS')}</p><div id="map"></div><div style="display:flex;gap:14px;flex-wrap:wrap;margin-top:14px">${Lx('mapL').map(l=>`<span style="font-size:13px;color:var(--dim)">${l}</span>`).join('')}</div></div>`;
setTimeout(()=>{if(mapO){mapO.remove();mapO=null}mapO=window.L.map('map').setView([47.5,67],5);window.L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OSM',maxZoom:17}).addTo(mapO);const cl={Canyon:'#D35C2C',Lake:'#2D6AB4','National Park':'#2E8B4A',Mountain:'#5C6BC0',Unique:'#B8860B'};A.forEach(a=>{const c=cl[a.cat]||'#D35C2C';const ic=window.L.divIcon({className:'',iconSize:[32,32],iconAnchor:[16,16],html:`<div style="width:32px;height:32px;border-radius:50%;background:${c};display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 2px 8px rgba(0,0,0,.3);border:3px solid #fff;cursor:pointer">${CATS[a.cat]||'📍'}</div>`});const m=window.L.marker([a.lat,a.lng],{icon:ic}).addTo(mapO);m.bindPopup(`<div class="pn">${t(a,'n')}</div><div class="pc" style="color:${c}">${CATS[a.cat]||''} ${a.cat} · ${a.diff}</div><div class="pd">${t(a,'desc').substring(0,120)}…</div><div style="margin-top:3px;font-size:11px;color:#999">📅 ${a.best} · 💵 ${a.fee}</div><button class="pbtn" onclick="go('attraction',${a.id})">${lang==='en'?'View Details':'Подробнее'}</button>`,{maxWidth:280})});setTimeout(()=>mapO.invalidateSize(),300)},150)}
function rGuide(){const lg={v_en:"54+ countries (USA, EU, UK, Canada, Australia) visa-free up to 30 days. Passport 3+ months validity. Registration if 5+ days (hotel handles it).",v_ru:"54+ стран — безвиз до 30 дней. Паспорт 3+ мес. Регистрация при 5+ днях.",a_en:"Almaty (ALA), Astana (NQZ), Aktau (SCO), Shymkent (CIT). Direct: Dubai, Istanbul, Seoul, Frankfurt, London, CIS.",a_ru:"Алматы, Астана, Актау, Шымкент. Прямые: Дубай, Стамбул, Сеул, Франкфурт.",s_en:"Kcell, Beeline, Tele2, Altel 4G. SIM at airports. 20GB ~$5.50/mo.",s_ru:"Kcell, Beeline, Tele2. SIM в аэропортах. 20 ГБ ~$5.50/мес.",sf_en:"Generally safe. Yandex Go / InDrive for taxis. Cash outside cities.",sf_ru:"Безопасен. Такси: Yandex Go / InDrive. Наличные вне городов.",c_en:"Tenge (KZT). ~480 = $1. Cards in cities, cash rural. Wise/Revolut.",c_ru:"Тенге. ~480 = $1. Карты в городах, наличные. Wise/Revolut."};
const tr=[["City bus","$0.17 / 80 ₸"],["Taxi (~30m)","$4 / 1,900 ₸"],["Intercity bus","$5–20"],["Train (ALM–TSE)","$20–40"],["Domestic flight","$30–100"],["Car rental/day","$40–100"]];
let h=`<div class="cnt sec"><button class="bb" onclick="go('home')">${Lx('bk')}</button><div class="st">${Lx('guideT')}</div><div class="ig" style="margin-bottom:32px">`;
h+=`<div class="ic"><div class="io">🛂</div><h4>${Lx('visa')}</h4><p>${lg['v_'+lang]}</p></div>`;
h+=`<div class="ic"><div class="io">✈️</div><h4>${Lx('air')}</h4><p>${lg['a_'+lang]}</p></div>`;
h+=`<div class="ic"><div class="io">📱</div><h4>${Lx('sim')}</h4><p>${lg['s_'+lang]}</p></div>`;
h+=`<div class="ic"><div class="io">🛡️</div><h4>${Lx('safe')}</h4><p>${lg['sf_'+lang]}</p></div>`;
h+=`<div class="ic"><div class="io">💱</div><h4>${Lx('curr')}</h4><p>${lg['c_'+lang]}</p></div></div>`;
h+=`<div class="st" style="font-size:22px;margin-bottom:12px">${Lx('trT')}</div><table class="pt"><thead><tr><th>Type</th><th>Price</th></tr></thead><tbody>`;
tr.forEach(r=>{h+=`<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`});h+='</tbody></table></div>';document.getElementById('page-guide').innerHTML=h}
function rPrices(){const ac=[["Hostel/Dorm",8,15],["Guesthouse",15,35],["3★ Hotel",35,70],["4-5★ Hotel",80,250],["Yurt Camp",30,60]];const fd=[["Street food",2,5],["Local restaurant",5,15],["Mid-range",15,30],["Fine dining",30,60]];
function pt(d,l){let h=`<table class="pt"><thead><tr><th>${l}</th><th>USD</th></tr></thead><tbody>`;d.forEach(r=>{h+=`<tr><td>${r[0]}</td><td>$${r[1]}–${r[2]}</td></tr>`});return h+'</tbody></table>'}
document.getElementById('page-prices').innerHTML=`<div class="cnt sec"><button class="bb" onclick="go('home')">${Lx('bk')}</button><div class="st">${Lx('prT')}</div><div class="bg" style="margin:24px 0"><div class="bc2"><div class="s" style="color:var(--green)">Backpacker</div><div class="rv">$15–35</div><div class="un">/day</div></div><div class="bc2"><div class="s" style="color:var(--blue)">Mid-range</div><div class="rv">$50–80</div><div class="un">/day</div></div><div class="bc2"><div class="s" style="color:var(--accent)">Comfortable</div><div class="rv">$80–150</div><div class="un">/day</div></div><div class="bc2"><div class="s" style="color:var(--gold)">Luxury</div><div class="rv">$150–300</div><div class="un">/day</div></div></div><div class="st" style="font-size:22px;margin:24px 0 12px">Accommodation</div>${pt(ac,'Type')}<div class="st" style="font-size:22px;margin:24px 0 12px">Food</div>${pt(fd,'Type')}<p style="color:var(--muted);font-size:12px;margin-top:20px">${Lx('note')}</p></div>`}
go('home');
</script>
</body>
</html>
